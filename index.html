<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Fashion Store</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .fade-in {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.6s ease;
    }

    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-gray-50">

  <!-- NAVBAR -->
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">

      <div class="flex justify-between items-center h-16">

        <!-- LOGO -->
        <h1 class="text-xl md:text-2xl font-bold">FASHION STORE</h1>

        <!-- DESKTOP NAV -->
        <nav class="hidden md:flex gap-8 font-medium">
          <a href="#" class="hover:text-red-500">Home</a>
          <a href="#" class="hover:text-red-500">Shop</a>
          <a href="#" class="hover:text-red-500">Categories</a>
          <a href="#" class="hover:text-red-500">Contact</a>
        </nav>

        <!-- SEARCH (desktop only) -->
        <form id="searchForm" class="hidden md:block">
          <input id="searchInput"
            type="text"
            placeholder="Search products"
            class="border px-4 py-2 rounded-lg outline-none w-56">
        </form>

        <!-- ICONS -->
        <div class="flex items-center gap-4 md:gap-6 text-xl">
          <i class="fa-regular fa-heart cursor-pointer"></i>
          <i class="fa-solid fa-cart-shopping cursor-pointer"></i>

          <button class="hidden md:block bg-black text-white px-5 py-2 rounded-lg">Login</button>

          <!-- HAMBURGER -->
          <button id="menuBtn" class="md:hidden text-2xl">
            <i class="fa fa-bars"></i>
          </button>
        </div>

      </div>

    </div>

    <!-- MOBILE MENU -->
    <div id="mobileMenu" class="hidden md:hidden px-4 pb-4 space-y-3 bg-white">
      <a href="#" class="block">Home</a>
      <a href="#" class="block">Shop</a>
      <a href="#" class="block">Categories</a>
      <a href="#" class="block">Contact</a>

      <!-- MOBILE SEARCH -->
      <input id="mobileSearch"
        type="text"
        placeholder="Search products"
        class="w-full border px-4 py-2 rounded-lg mt-2">
    </div>
  </header>


  <!-- CATEGORY FILTER -->
  <section class="max-w-7xl mx-auto px-4 mt-8 md:mt-10">
    <div class="flex flex-wrap justify-center gap-3 md:gap-4">
      <button class="category-btn bg-black text-white px-4 md:px-5 py-2 rounded-lg" data-category="all">All</button>
      <button class="category-btn border px-4 md:px-5 py-2 rounded-lg" data-category="cap">Face Caps</button>
      <button class="category-btn border px-4 md:px-5 py-2 rounded-lg" data-category="trousers">Trousers</button>
      <button class="category-btn border px-4 md:px-5 py-2 rounded-lg" data-category="joggers">Joggers</button>
      <button class="category-btn border px-4 md:px-5 py-2 rounded-lg" data-category="jersey">Jerseys</button>
      <button class="category-btn border px-4 md:px-5 py-2 rounded-lg" data-category="tops">Tops</button>
      <button class="category-btn border px-4 md:px-5 py-2 rounded-lg" data-category="tank">Armless Tanks</button>
    </div>
  </section>


  <!-- PRODUCTS -->
  <section class="max-w-7xl mx-auto px-4 mt-8 md:mt-10">
    <div id="productContainer"
      class="grid 
      grid-cols-2 
      sm:grid-cols-2 
      md:grid-cols-3 
      lg:grid-cols-4 
     
      gap-4 md:gap-6">
    </div>
  </section>


  <!-- PAGINATION -->
  <div class="flex justify-center mt-10 mb-16 px-4">
    <div id="pagination" class="flex flex-wrap gap-2 md:gap-3"></div>
  </div>


  <!-- FOOTER -->
  <footer class="bg-black text-white py-10 md:py-12">
    <div class="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-8 md:gap-10">

      <div>
        <h2 class="text-xl md:text-2xl font-bold mb-3">Fashion Store</h2>
        <p class="text-gray-400 text-sm md:text-base">Premium fashion wears for modern lifestyle.</p>
      </div>

      <div>
        <h3 class="font-semibold mb-3">Quick Links</h3>
        <ul class="space-y-2 text-gray-400 text-sm md:text-base">
          <li>Home</li>
          <li>Shop</li>
          <li>New Arrivals</li>
          <li>Contact</li>
        </ul>
      </div>

      <div>
        <h3 class="font-semibold mb-3">Newsletter</h3>
        <input type="email" placeholder="Enter email"
          class="w-full px-4 py-2 rounded-lg text-black mb-3">
        <button class="bg-red-500 px-6 py-2 rounded-lg w-full">Subscribe</button>
      </div>

    </div>

    <p class="text-center text-gray-500 mt-10 text-sm">© 2026 Fashion Store</p>
  </footer>

  <script src="card.js"></script>

</body>
</html>
